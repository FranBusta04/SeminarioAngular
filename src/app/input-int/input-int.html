<div class="input-group input-group-sm quantity-input"*ngIf="max > 0">

  <button 
  class="btn btn-outline-primary" type="button" (click)="downQuantity()">−
  </button>

  <input type="text" class="form-control text-center"[(ngModel)]="quantity"readonly>

  <button class="btn btn-outline-primary" type="button" (click)="upQuantity()">+
  </button>

</div>
